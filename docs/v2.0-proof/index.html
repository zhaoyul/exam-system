<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: #f5f7fa; color: #1f2937; line-height: 1.6; }
.header { background: linear-gradient(135deg, #1a56db, #1e40af); color: #fff; padding: 2.5rem 2rem; }
.header h1 { font-size: 1.75rem; margin-bottom: .5rem; }
.header p { color: #bfdbfe; font-size: .95rem; }
.header .meta { margin-top: .75rem; font-size: .85rem; color: #93c5fd; }
.statbar { display: flex; gap: 1.5rem; padding: 1.25rem 2rem; background: #fff; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; }
.stat { display: flex; align-items: center; gap: .5rem; font-size: .9rem; }
.stat .num { font-weight: 700; font-size: 1.2rem; }
.stat.pass .num { color: #059669; }
.stat.warn .num { color: #d97706; }
.stat.fail .num { color: #dc2626; }
.container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
.module { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 1.5rem; overflow: hidden; }
.module-head { padding: 1rem 1.25rem; font-weight: 600; font-size: 1rem; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: .5rem; }
.module-head .badge { font-size: .7rem; padding: .15rem .5rem; border-radius: 999px; font-weight: 500; }
.badge.done { background: #d1fae5; color: #065f46; }
.badge.partial { background: #fef3c7; color: #92400e; }
.req { padding: .85rem 1.25rem; border-bottom: 1px solid #f3f4f6; display: flex; gap: .75rem; align-items: flex-start; }
.req:last-child { border-bottom: none; }
.req .idx { width: 2rem; min-width: 2rem; height: 1.5rem; border-radius: 4px; font-size: .75rem; display: flex; align-items: center; justify-content: center; font-weight: 600; }
.req .idx.done { background: #d1fae5; color: #065f46; }
.req .idx.warn { background: #fef3c7; color: #92400e; }
.req .idx.fail { background: #fee2e2; color: #991b1b; }
.req .body { flex: 1; }
.req .body .text { font-size: .9rem; }
.req .body .proof { margin-top: .5rem; font-size: .78rem; color: #059669; display: flex; flex-wrap: wrap; gap: .35rem .6rem; }
.req .body .proof a { color: #2563eb; text-decoration: none; border: 1px solid #bfdbfe; padding: .1rem .45rem; border-radius: 4px; font-size: .75rem; }
.req .body .proof a:hover { background: #eff6ff; }
.img-grid { display: flex; flex-wrap: wrap; gap: .75rem; margin: .5rem 0 0 0; }
.img-grid img { width: 100%; max-width: 480px; border: 1px solid #e5e7eb; border-radius: 6px; cursor: pointer; transition: transform .15s; }
.img-grid img:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
.img-grid .cap { font-size: .78rem; color: #6b7280; text-align: center; margin-top: .25rem; }
footer { text-align: center; padding: 2rem; font-size: .85rem; color: #9ca3af; }
.modal { display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.75); align-items: center; justify-content: center; cursor: pointer; }
.modal.show { display: flex; }
.modal img { max-width: 90vw; max-height: 90vh; border-radius: 4px; }
</style>

  { id: 33, text: "①添加场次。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },
  { id: 34, text: "②添加考点。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },
  { id: 35, text: "③安排考生。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },
  { id: 36, text: "④查看分配/取消分配计划。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },
  { id: 37, text: "⑤考生多时增加考场或追加机位。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },
  { id: 38, text: "⑥点击输入安排→技能编排第二环节。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },
  { id: 39, text: "技能编排。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },
  { id: 40, text: "①自动将理论考点添加到技能考点。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },
  { id: 41, text: "②确定考核时间。循环天数自动生成批次。", module: "考场编排", proof: ["07-exam-arrangement.png"], status: "done" },

// ── Render ──
const modules = [...new Set(requirements.map(r => r.module))];
const total = requirements.length;
const done = requirements.filter(r => r.status === 'done').length;
const warn = requirements.filter(r => r.status === 'warn').length;
const fail = requirements.filter(r => r.status === 'fail').length;

document.getElementById('stats').innerHTML = `
  <div class="stat pass"><span class="num">${total}</span> 总需求</div>
  <div class="stat pass"><span class="num">${done}</span> ✅ 已完成</div>
  <div class="stat warn"><span class="num">${warn}</span> ⚠️ 待梳理</div>
  <div class="stat fail"><span class="num">${fail}</span> ❌ 未实现</div>
`;

let html = '';
for (const m of modules) {
  const items = requirements.filter(r => r.module === m);
  const allDone = items.every(r => r.status === 'done');
  html += `<div class="module">
    <div class="module-head">
      ${m}
      <span class="badge ${allDone ? 'done' : 'partial'}">${allDone ? '全部完成' : '部分完成'}</span>
    </div>`;
  for (const r of items) {
    const statusLabel = { done: '✅', warn: '⚠️', fail: '❌' }[r.status];
    let images = '';
    if (r.proof.length) {
      images = '<div class="img-grid">';
      for (const p of r.proof) {
        images += `<div><img src="${p}" onclick="showModal(this.src)" loading="lazy"><div class="cap">${p}</div></div>`;
      }
      images += '</div>';
    }
    html += `<div class="req">
      <div class="idx ${r.status}">${r.id}</div>
      <div class="body">
        <div class="text">${statusLabel} ${r.text}</div>
        <div class="proof">${r.proof.length ? r.proof.map(p => `<a href="${p}" target="_blank">📷 ${p}</a>`).join('') : '<span style="color:#9ca3af">（暂缺截图）</span>'}</div>
        ${images}
      </div>
    </div>`;
  }
  html += '</div>';
}
document.getElementById('content').innerHTML = html;

function showModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modal').classList.add('show');
}
</script>
